<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBK Productions</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <script src="scripts/include-html.js" defer></script>
</head>

<body>

<!-- NAV BAR -->
<div data-include="includes/nav-bar.html"></div>
<section class="donate-strip donate-strip-header" data-include="includes/donate-bar.html"></section>

<main class="subpage">

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="page-bg-video">
    <source src="video/background.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="page-overlay"></div>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <h1>Resources</h1>
  </section>

  <!-- PAGE CONTENT -->
  <section class="page-content">
    <div class="resources-intro">
      <p>Use the media player below to play rehearsal or accompaniment versions from the show.</p>
    </div>

    <section class="resource-library" aria-labelledby="music-man-jr-heading">
      <div class="resource-library-header">
        <p class="resource-library-kicker">Rehearsal Music</p>
        <h2 id="music-man-jr-heading">The Music Man Jr.</h2>
        <p>Rehearsal and accompaniment tracks</p>
      </div>

      <div class="audio-player-card">
        <div class="audio-player-header">
          <div class="player-info">
            <p class="audio-track-number" id="current-track-number">Track 02</p>
            <h3 id="current-track-title">Rock Island</h3>
            <p class="audio-track-version" id="current-track-version">Rehearsal</p>
          </div>
          <div class="player-mode-toggle" role="group" aria-label="Select track version">
            <button type="button" class="player-mode-button active" data-version="rehearsal">Rehearsal</button>
            <button type="button" class="player-mode-button" data-version="accompaniment">Accompaniment</button>
          </div>
        </div>

        <div class="player-controls">
          <button id="player-prev" type="button" class="player-nav-button" aria-label="Previous track">⏮</button>
          <button id="player-play-pause" type="button" class="player-play-button" aria-label="Play">▶</button>
          <button id="player-next" type="button" class="player-nav-button" aria-label="Next track">⏭</button>
          <audio id="shared-audio" preload="metadata">
            Your browser does not support the audio element.
          </audio>
        </div>

        <div class="player-progress-wrapper">
          <span id="current-time">0:00</span>
          <input id="player-seek" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek playback position">
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="audio-library" role="list" id="audio-library">
        <!-- Track cards will be generated dynamically from manifest -->
      </div>
    </section>
  </section>

</main>

<!-- FOOTER -->
<div data-include="includes/contact-bar.html"></div>
<div data-include="includes/attribution.html"></div>

<script src="script.js"></script>

</body>
</html>
