<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBK Productions</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <script src="scripts/include-html.js" defer></script>
</head>

<body>

<!-- NAV BAR -->
<div data-include="includes/nav-bar.html"></div>
<section class="donate-strip donate-strip-header" data-include="includes/donate-bar.html"></section>

<main class="subpage">

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="page-bg-video">
    <source src="video/background.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="page-overlay"></div>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <h1>Summer Workshop</h1>
  </section>

  <!-- WORKSHOP HEADER IMAGE -->
  <section class="workshop-header-image">
    <img src="images/Show%20Headers/The%20Music%20Man%20Jr.%20Header.jpg" alt="The Music Man Jr. Show Header">
  </section>

  <!-- PAGE CONTENT -->
  <section class="page-content workshop-content">
    <p>
      The 2026 Summer Theatre Workshop is complete. Take a look at some of the pictures below to relive the experience.
    </p>

    <div class="workshop-gallery-trigger-wrap">
      <button
        type="button"
        class="playbill-trigger"
        data-carousel-title="The Music Man Jr."
        data-gallery-folder="images/Past%20Productions/2026-The%20Music%20Man%20Jr"
      >
        View Production Photos
      </button>
    </div>
  </section>

  <div class="past-carousel-modal" id="past-carousel-modal" aria-hidden="true">
    <div class="past-carousel-backdrop" data-close-past-carousel></div>
    <div class="past-carousel-dialog" role="dialog" aria-modal="true" aria-labelledby="past-carousel-title">
      <button type="button" class="past-carousel-close" data-close-past-carousel aria-label="Close production carousel">&times;</button>
      <h2 id="past-carousel-title"></h2>
      <img id="past-carousel-image" src="" alt="">
      <div class="past-carousel-controls">
        <button type="button" class="past-carousel-nav" data-past-carousel-prev>&larr; Previous</button>
        <span id="past-carousel-count"></span>
        <button type="button" class="past-carousel-nav" data-past-carousel-next>Next &rarr;</button>
      </div>
    </div>
  </div>

</main>

<!-- FOOTER -->
<div data-include="includes/contact-bar.html"></div>
<div data-include="includes/attribution.html"></div>

<script src="script.js"></script>

</body>
</html>
