<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBK Productions</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <script src="scripts/include-html.js" defer></script>
</head>

<body>

<!-- NAV BAR -->
<div data-include="includes/nav-bar.html"></div>
<section class="donate-strip donate-strip-header" data-include="includes/donate-bar.html"></section>

<main class="subpage">

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="page-bg-video">
    <source src="video/background.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="page-overlay"></div>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <h1>About Us</h1>
  </section>

  <!-- PAGE CONTENT -->
  <section class="page-content about-content">
    
    <!--INTRO PARAGRAPH-->
    <div class="about-intro">
      <p>
        GBK stands for <strong>Garber, Buck, and Krontz</strong>. We are a family-run theatre program focused on
        creating meaningful, high-quality arts experiences for students and the community.
      </p>
    </div>

    <p class="about-instruction">Click a photo to read more about each team member.</p>

    <!-- TEAM MEMBER PROFILES -->
    <div class="profile-pic-grid">

      <!-- CAITLYN GARBER - PRODUCER -->
      <button
        type="button"
        class="profile-pic-card"
        data-bio-src="images/Profile%20Pics/Caitlyn%20Garber%20-%20Producer.png"
        data-bio-name="Caitlyn Garber - Producer / FHS Drama Club Advisor"
        data-bio-title="Producer / FHS Drama Club Advisor"
        data-bio-text="Caitlyn got her start in theatre and music from a very young age. She has been involved in dozens of productions and has played a variety of roles. Some of her favorites are Snoopy in 'Snoopy the Musical', the Narrator in 'JOSEPH and the Amazing Technicolor Dreamcoat', and Mrs. Paroo in 'The Music Man'. Caitlyn currently teaches Science at Frankton Jr/Sr High School and is the Drama Club and National Honor Society advisor. She is excited to share her love of the stage with her own three children and her students and hopes to ignite a love for musicals in the next generation."
      >
        <img src="images/Profile%20Pics/Caitlyn%20Garber%20-%20Producer.png" alt="Caitlyn Garber - Producer / FHS Drama Club Advisor profile photo">
        <span>
          <span class="profile-pic-name">Caitlyn Garber</span>
          <span class="profile-pic-role">Producer / FHS Drama Club Advisor</span>
        </span>
      </button>

      <!-- MARK KRONTZ - CREATIVE DIRECTOR -->
      <button
        type="button"
        class="profile-pic-card"
        data-bio-src="images/Profile%20Pics/Mark%20Krontz%20-%20Creative%20Director.png"
        data-bio-name="Mark Krontz - Creative Director"
        data-bio-title="Creative Director"
        data-bio-text="Mark has been involved in theater for over 50 years. He graduated from Anderson University with a degree in Speech, Communication and Theatre and Secondary Education with minors in Early Childhood and Christian Education. He began his directing career with a one act play, 'He Knew the Master' back in 1974. Since then, he has directed over 60 plays and musicals. His love for theatre is evident in the work you will see in this production. He currently serves as Pastor for Family Ministries at East Side Church of God in Anderson. He is honored to work alongside his wife, two daughters, a son-in-law and granddaughter. GBK Team is truly a 'Family Affair'!"
      >
        <img src="images/Profile%20Pics/Mark%20Krontz%20-%20Creative%20Director.png" alt="Mark Krontz - Creative Director profile photo">
        <span>
          <span class="profile-pic-name">Mark Krontz</span>
          <span class="profile-pic-role">Creative Director</span>
        </span>
      </button>

      <!-- MARY KRONTZ - MUSIC DIRECTOR -->
      <button
        type="button"
        class="profile-pic-card"
        data-bio-src="images/Profile%20Pics/Mary%20Krontz%20-%20Music%20Director.png"
        data-bio-name="Mary Krontz - Music Director"
        data-bio-title="Music Director"
        data-bio-text="Mary loves music. She holds a Vocal Performance degree with minors in Physical Education and Church Music. Mary has served as Worship Leader, Children's Choir Director, and vocal coach for many students. She has performed in many productions in high school, college and her adult life. Several highlights in her career were singing at the Palladium Carmel and The Michigan State Fairgrounds in Detroit. She also played the Narrator in 'JOSEPH and the Amazing Technicolor Dreamcoat'. She currently serves as Early Childhood Director at East Side Church of God in Anderson. She too is pleased to be a part of this 'Family Affair' we call GBK Productions."
      >
        <img src="images/Profile%20Pics/Mary%20Krontz%20-%20Music%20Director.png" alt="Mary Krontz - Music Director profile photo">
        <span>
          <span class="profile-pic-name">Mary Krontz</span>
          <span class="profile-pic-role">Music Director</span>
        </span>
      </button>

      <!-- CARISSA BUCK - CHOREOGRAPHER -->
      <button
        type="button"
        class="profile-pic-card"
        data-bio-src="images/Profile%20Pics/Carissa%20Buck%20-%20Choreographer.png"
        data-bio-name="Carissa Buck - Choreographer"
        data-bio-title="Choreographer"
        data-bio-text="Carissa has been passionate about musical theatre from a young age, starting her journey at just 4 years old as she played Gretel in Pontiac Central's production of 'The Sound of Music'. Since then, she has performed in numerous productions with her favorite role being Marian in 'The Music Man'. In addition to performing, she has choreographed several shows including 'ANNIE', 'Hello Dolly' and 'JOSEPH and the Amazing Technicolor Dreamcoat'. Now 20 years after her final performance, she is back and recently choreographed 'Once Upon A Mattress' and 'ANNIE jr.' for Frankton High School. She is excited to continue her love for theatre choreography in this show. Carissa currently teaches 3rd grade in Fishers."
      >
        <img src="images/Profile%20Pics/Carissa%20Buck%20-%20Choreographer.png" alt="Carissa Buck - Choreographer profile photo">
        <span>
          <span class="profile-pic-name">Carissa Buck</span>
          <span class="profile-pic-role">Choreographer</span>
        </span>
      </button>

      <!-- GRANT GARBER - TECHNICAL DIRECTOR -->
      <button
        type="button"
        class="profile-pic-card"
        data-bio-src="images/Profile%20Pics/Grant%20Garber%20-%20Technical%20Director.png"
        data-bio-name="Grant Garber - Technical Director"
        data-bio-title="Technical Director"
        data-bio-text="Grant married into a musical family. However, he was actively involved in music and theatre in high school, so he is not new to the stage. In high school, he played the role of Puck in 'A Midsummer Night's Dream', Curly in 'Oklahoma' and performed in 'Beauty and the Beast'. He was also in Show Choir for 3 years. Grant's technical and engineering skills have been extremely helpful in building sets and running sound. Grant teaches Computer Science at Frankton Jr/Sr High School and enjoys being part of the team."
      >
        <img src="images/Profile%20Pics/Grant%20Garber%20-%20Technical%20Director.png" alt="Grant Garber - Technical Director profile photo">
        <span>
          <span class="profile-pic-name">Grant Garber</span>
          <span class="profile-pic-role">Technical Director</span>
        </span>
      </button>
    </div>
  </section>

  <!-- BIO MODAL -->
  <div class="bio-modal" id="bio-modal" aria-hidden="true">
    <div class="bio-modal-backdrop" data-close-bio-modal></div>
    <div class="bio-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="bio-modal-name">
      <button type="button" class="bio-modal-close" data-close-bio-modal aria-label="Close bio modal">&times;</button>
      <img id="bio-modal-image" src="" alt="">
      <div class="bio-modal-copy">
        <h2 id="bio-modal-name"></h2>
        <p id="bio-modal-title" class="bio-modal-title"></p>
        <p id="bio-modal-text"></p>
      </div>
    </div>
  </div>

</main>

<!-- FOOTER -->
<div data-include="includes/contact-bar.html"></div>
<div data-include="includes/attribution.html"></div>

<script src="script.js"></script>

</body>
</html>
